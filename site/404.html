<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Page Not Found — Geneplore AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

    <style media="screen">
      :root {
        --bg: #dfe6eb;
        --accent: #a21eb4;
        --accent-dark: #8a1a99;
        --ink: #18192d;
        --muted: #555;
        --surface: #ffffff;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background-color: var(--bg);
        font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: var(--ink);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }

      #message {
        background: var(--surface);
        max-width: 440px;
        width: 100%;
        padding: 48px 40px;
        border-radius: 20px;
        border: 1px solid rgba(24, 25, 45, 0.05);
        box-shadow: 0 4px 10px rgba(24, 25, 45, 0.08), 0 12px 32px rgba(24, 25, 45, 0.1);
        text-align: center;
      }

      #message h2 {
        font-size: 4rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.05;
        margin-bottom: 8px;
        background: linear-gradient(120deg, var(--ink) 40%, var(--accent));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }

      #message h1 {
        font-size: 1.4rem;
        font-weight: 500;
        color: var(--ink);
        margin-bottom: 16px;
      }

      #message p {
        font-family: 'DM Sans', 'Poppins', sans-serif;
        font-size: 1rem;
        line-height: 1.65;
        color: var(--muted);
        margin-bottom: 28px;
      }

      #message a {
        display: inline-block;
        padding: 14px 36px;
        background-color: var(--accent);
        color: #ffffff;
        font-family: 'DM Sans', 'Poppins', sans-serif;
        font-weight: 500;
        font-size: 1rem;
        text-decoration: none;
        border-radius: 50px;
        transition: background-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
        box-shadow: 0 6px 16px rgba(162, 30, 180, 0.25);
      }

      #message a:hover {
        background-color: var(--accent-dark);
        transform: translateY(-2px);
        box-shadow: 0 10px 22px rgba(162, 30, 180, 0.32);
      }
    </style>
  </head>
  <body>
    <div id="message">
      <h2>404</h2>
      <h1>Page Not Found</h1>
      <p>The specified file was not found on this website. Please check the URL for mistakes and try again.</p>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
